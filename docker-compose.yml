services:
  # ==========================================
  # AMBIENTE DE PRODUÇÃO
  # ==========================================
  api-nairim:
    container_name: nairim-api
    build: .
    restart: always
    depends_on:
      - postgres
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env
      - ./uploads:/app/uploads
      - ./backup:/app/backup
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public" 
      - "traefik.http.routers.api-nairim.rule=Host(`nairim.com.br`) && PathPrefix(`/backend`)"
      - "traefik.http.routers.api-nairim.entrypoints=websecure"
      - "traefik.http.routers.api-nairim.tls.certresolver=myresolver" 
      - "traefik.http.middlewares.api-strip.stripprefix.prefixes=/backend"
      - "traefik.http.routers.api-nairim.middlewares=api-strip"
      - "traefik.http.services.api-nairim.loadbalancer.server.port=5000"
    networks:
      - traefik-public 
      - default

  postgres:
    image: postgres:16-alpine
    container_name: nairim-postgres
    restart: always
    environment:
      POSTGRES_USER: nairim
      POSTGRES_PASSWORD: nairim
      POSTGRES_DB: nairim_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - default

  # ==========================================
  # AMBIENTE DE TESTE 1 (Usando banco Neon)
  # ==========================================
  api-nairim-test:
    container_name: nairim-api-test
    build: .
    restart: always
    env_file:
      - .env.test
    environment:
      - PORT=5000
    volumes:
      - ./.env.test:/app/.env
      - ./uploads-test:/app/uploads
      - ./backup-test:/app/backup
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.api-nairim-test.rule=Host(`nairim.com.br`) && PathPrefix(`/backend-test`)"
      - "traefik.http.routers.api-nairim-test.entrypoints=websecure"
      - "traefik.http.routers.api-nairim-test.tls.certresolver=myresolver"
      - "traefik.http.middlewares.api-test-strip.stripprefix.prefixes=/backend-test"
      - "traefik.http.routers.api-nairim-test.middlewares=api-test-strip"
      - "traefik.http.services.api-nairim-test.loadbalancer.server.port=5000"
    networks:
      - traefik-public
      - default

  # ==========================================
  # AMBIENTE DE TESTE 2 (Novo banco isolado)
  # ==========================================
  api-nairim-test-2:
    container_name: nairim-api-test-2
    build: .
    restart: always
    depends_on:
      - postgres-test-2
    env_file:
      - .env.test2
    environment:
      - PORT=5000
    volumes:
      - ./.env.test2:/app/.env
      - ./uploads-test-2:/app/uploads
      - ./backup-test-2:/app/backup
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.api-nairim-test-2.rule=Host(`nairim.com.br`) && PathPrefix(`/backend-test-2`)"
      - "traefik.http.routers.api-nairim-test-2.entrypoints=websecure"
      - "traefik.http.routers.api-nairim-test-2.tls.certresolver=myresolver"
      - "traefik.http.middlewares.api-test-2-strip.stripprefix.prefixes=/backend-test-2"
      - "traefik.http.routers.api-nairim-test-2.middlewares=api-test-2-strip"
      - "traefik.http.services.api-nairim-test-2.loadbalancer.server.port=5000"
    networks:
      - traefik-public
      - default

  postgres-test-2:
    image: postgres:16-alpine
    container_name: nairim-postgres-test-2
    restart: always
    environment:
      POSTGRES_USER: nairim
      POSTGRES_PASSWORD: nairim
      POSTGRES_DB: nairim_test2_db 
    ports:
      - "5434:5432"
    volumes:
      - postgres_test2_data:/var/lib/postgresql/data 
    networks:
      - default

  # ==========================================
  # AMBIENTE DE HOMOLOGAÇÃO
  # ==========================================
  api-nairim-homolog:
    container_name: nairim-api-homolog
    build: .
    restart: always
    depends_on:
      - postgres-homolog
    env_file:
      - .env.homolog
    environment:
      - PORT=5000
    volumes:
      - ./.env.homolog:/app/.env
      - ./uploads-homolog:/app/uploads
      - ./backup-homolog:/app/backup
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.api-nairim-homolog.rule=Host(`nairim.com.br`) && PathPrefix(`/backend-homolog`)"
      - "traefik.http.routers.api-nairim-homolog.entrypoints=websecure"
      - "traefik.http.routers.api-nairim-homolog.tls.certresolver=myresolver"
      - "traefik.http.middlewares.api-homolog-strip.stripprefix.prefixes=/backend-homolog"
      - "traefik.http.routers.api-nairim-homolog.middlewares=api-homolog-strip"
      - "traefik.http.services.api-nairim-homolog.loadbalancer.server.port=5000"
    networks:
      - traefik-public
      - default

  postgres-homolog:
    image: postgres:16-alpine
    container_name: nairim-postgres-homolog
    restart: always
    environment:
      POSTGRES_USER: nairim
      POSTGRES_PASSWORD: nairim
      POSTGRES_DB: nairim_homolog_db
    ports:
      - "5436:5432"
    volumes:
      - postgres_homolog_data:/var/lib/postgresql/data
    networks:
      - default

  # ==========================================
  # MINIO - CDN / Armazenamento de imagens self-hosted (S3 compatível)
  # ==========================================
  minio:
    image: minio/minio:latest
    container_name: nairim-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./minio-data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      # Rota da API/CDN (porta 9000) — onde as imagens ficam públicas
      - "traefik.http.routers.minio-api.rule=Host(`cdn.nairim.com.br`)"
      - "traefik.http.routers.minio-api.entrypoints=websecure"
      - "traefik.http.routers.minio-api.tls.certresolver=myresolver"
      - "traefik.http.routers.minio-api.service=minio-api"
      - "traefik.http.services.minio-api.loadbalancer.server.port=9000"
      # Rota do Console/Painel administrativo (porta 9001)
      - "traefik.http.routers.minio-console.rule=Host(`cdn-painel.nairim.com.br`)"
      - "traefik.http.routers.minio-console.entrypoints=websecure"
      - "traefik.http.routers.minio-console.tls.certresolver=myresolver"
      - "traefik.http.routers.minio-console.service=minio-console"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"
    networks:
      - traefik-public
      - default

networks:
  traefik-public:
    external: true

volumes:
  postgres_data:
  postgres_test2_data:
  postgres_homolog_data:
