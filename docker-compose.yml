services:
  # ==========================================
  # AMBIENTE DE PRODUÇÃO
  # ==========================================
  api-nairim:
    container_name: nairim-api
    build: .
    restart: always
    depends_on:
      - postgres
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env
      - ./uploads:/app/uploads
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public" 
      - "traefik.http.routers.api-nairim.rule=Host(`nairim.com.br`) && PathPrefix(`/backend`)"
      - "traefik.http.routers.api-nairim.entrypoints=websecure"
      - "traefik.http.routers.api-nairim.tls.certresolver=myresolver" 
      - "traefik.http.middlewares.api-strip.stripprefix.prefixes=/backend"
      - "traefik.http.routers.api-nairim.middlewares=api-strip"
      - "traefik.http.services.api-nairim.loadbalancer.server.port=5000"
    networks:
      - traefik-public 
      - default

  postgres:
    image: postgres:16-alpine
    container_name: nairim-postgres
    restart: always
    environment:
      POSTGRES_USER: nairim
      POSTGRES_PASSWORD: nairim
      POSTGRES_DB: nairim_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - default

  # ==========================================
  # AMBIENTE DE TESTE 1 (Usando banco Neon)
  # ==========================================
  api-nairim-test:
    container_name: nairim-api-test
    build: .
    restart: always
    env_file:
      - .env.test
    environment:
      - PORT=5000
    volumes:
      - ./.env.test:/app/.env
      - ./uploads-test:/app/uploads
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.api-nairim-test.rule=Host(`nairim.com.br`) && PathPrefix(`/backend-test`)"
      - "traefik.http.routers.api-nairim-test.entrypoints=websecure"
      - "traefik.http.routers.api-nairim-test.tls.certresolver=myresolver"
      - "traefik.http.middlewares.api-test-strip.stripprefix.prefixes=/backend-test"
      - "traefik.http.routers.api-nairim-test.middlewares=api-test-strip"
      - "traefik.http.services.api-nairim-test.loadbalancer.server.port=5000"
    networks:
      - traefik-public
      - default

  # ==========================================
  # AMBIENTE DE TESTE 2 (Novo banco isolado)
  # ==========================================
  api-nairim-test-2:
    container_name: nairim-api-test-2
    build: .
    restart: always
    depends_on:
      - postgres-test-2
    env_file:
      - .env.test2
    environment:
      - PORT=5000
    volumes:
      - ./.env.test2:/app/.env 
      - ./uploads-test-2:/app/uploads
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.api-nairim-test-2.rule=Host(`nairim.com.br`) && PathPrefix(`/backend-test-2`)"
      - "traefik.http.routers.api-nairim-test-2.entrypoints=websecure"
      - "traefik.http.routers.api-nairim-test-2.tls.certresolver=myresolver"
      - "traefik.http.middlewares.api-test-2-strip.stripprefix.prefixes=/backend-test-2"
      - "traefik.http.routers.api-nairim-test-2.middlewares=api-test-2-strip"
      - "traefik.http.services.api-nairim-test-2.loadbalancer.server.port=5000"
    networks:
      - traefik-public
      - default

  postgres-test-2:
    image: postgres:16-alpine
    container_name: nairim-postgres-test-2
    restart: always
    environment:
      POSTGRES_USER: nairim
      POSTGRES_PASSWORD: nairim
      POSTGRES_DB: nairim_test2_db 
    ports:
      - "5434:5432"
    volumes:
      - postgres_test2_data:/var/lib/postgresql/data 
    networks:
      - default

networks:
  traefik-public: 
    external: true

volumes:
  postgres_data:
  postgres_test2_data: # Declarando o novo volume do banco 2
